# Pre-commit hooks para JobHunter AI.
# Instalar: pip install pre-commit && pre-commit install
# Correr manualmente: pre-commit run --all-files

repos:
  # Hygiene basica
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
        exclude: ^tests/fixtures/
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Linter ligero: solo errores reales (syntax, pyflakes) — sin reformatear
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--select=E9,F,W6", "--fix"]

  # Compile check local (atrapa errores de sintaxis al instante)
  - repo: local
    hooks:
      - id: python-compile
        name: Python compile check
        entry: python -c "import py_compile, sys; [py_compile.compile(f, doraise=True) for f in sys.argv[1:]]"
        language: system
        types: [python]
        pass_filenames: true

      # Tests completos solo en pre-push (no pre-commit) porque tardan 200ms
      # pero se acumulan si se hace un commit por archivo.
      - id: unittests
        name: Run unittests
        entry: python -m unittest discover -s tests -p "test_*.py"
        language: system
        pass_filenames: false
        stages: [pre-push]
