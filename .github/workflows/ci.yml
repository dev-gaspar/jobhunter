name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check (catches f-string bugs on Py 3.10)
        run: |
          python -c "import py_compile; py_compile.compile('job.py', doraise=True)"
          if [ -d jobhunter ]; then python -m compileall -q jobhunter/; fi

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: CLI does not crash
        run: |
          python job.py --help
          python job.py help

  block-direct-push-to-main:
    name: Block direct push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Reject direct push
        run: |
          echo "::error::Push directo a main no permitido. Abre un PR desde dev."
          exit 1
